name: Process msg queue
on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分鐘
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -s -X POST \
            "https://plnsnmftdxtbxjgdzkbq.supabase.co/functions/v1/process-queue" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json"
